<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time-to-Therapy | Clinician Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      background: radial-gradient(circle at 20% 20%, #d8fff8 0%, #f3f6fb 45%, #eef2f9 100%);
    }
    .font-headline { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
  <script src="/static/auth.js" defer></script>
</head>
<body class="text-slate-900">
  <main class="min-h-screen flex items-center justify-center px-4 py-8">
    <section class="w-full max-w-xl rounded-2xl border border-teal-100 bg-white/90 backdrop-blur p-8 shadow-xl">
      <div class="flex items-center gap-3 mb-5">
        <span class="material-symbols-outlined text-teal-700 text-3xl">clinical_notes</span>
        <h1 class="text-3xl font-headline font-extrabold text-teal-900">Time-to-Therapy</h1>
      </div>

      <p class="text-sm text-slate-600 mb-5">
        Secure clinician access is required before using the Coverage Matrix, Copilot Drafting, and History workflows.
      </p>

      <div id="auth-status" class="rounded-lg bg-slate-100 text-slate-700 text-sm px-4 py-3 mb-6">
        Initializing authentication...
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <button id="auth-signin-btn" type="button" class="w-full rounded-lg bg-teal-700 text-white font-semibold py-3 hover:bg-teal-800 transition-colors">
          Sign In
        </button>
        <button id="auth-signup-btn" type="button" class="w-full rounded-lg border border-teal-700 text-teal-700 font-semibold py-3 hover:bg-teal-50 transition-colors">
          Create Account
        </button>
      </div>

      <button id="auth-continue-btn" type="button" class="hidden mt-4 w-full rounded-lg border border-slate-300 text-slate-700 font-semibold py-3 hover:bg-slate-50 transition-colors">
        Continue to App
      </button>

      <p class="text-xs text-slate-500 mt-6">
        By signing in, clinicians can securely access patient context workflows and payer policy evidence.
      </p>
    </section>
  </main>
</body>
</html>
